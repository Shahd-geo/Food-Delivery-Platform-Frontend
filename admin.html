<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codeline Eats — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
<main class="container">

  <!-- page-level error banner (network failures) -->
  <div id="pageBanner"></div>

  <div class="dashboard-header">
    <h1>Platform Overview</h1>
    <input type="date" id="reportDate" class="date-picker" aria-label="Select date">
  </div>

  <!-- Metric cards: orders / revenue / avg order / cancel % -->
  <section class="metric-grid" id="metricGrid" aria-live="polite"></section>

  <!-- Busiest hours chart + top loyalty customers -->
  <div class="panel-row">
    <section class="panel">
      <h2>Busiest Hours</h2>
      <div class="chart-wrap">
        <canvas id="busiestHoursChart"></canvas>
      </div>
    </section>
    <section class="panel">
      <h2>Top Loyalty Customers</h2>
      <div id="loyaltyTableWrap"></div>
    </section>
  </div>

  <!-- Driver leaderboard -->
  <section class="panel" style="margin-bottom:48px;">
    <h2>Driver Leaderboard</h2>
    <div id="driverTableWrap"></div>
  </section>

</main>

<script type="module" src="./js/admin.js"></script>
</body>
</html>
